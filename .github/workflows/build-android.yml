name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN_YONGXINGNEWS }}

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Build with EAS
        run: eas build --platform android --profile preview --no-wait

      - name: Wait for build and download APK
        run: |
          echo "Waiting for EAS Build to complete..."
          echo "Please visit the EAS Build dashboard to download the APK:"
          echo "https://expo.dev/accounts/moonwishnet/projects/geocontacts-plus/builds"
