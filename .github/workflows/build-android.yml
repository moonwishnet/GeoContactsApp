name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Prebuild for Android
        run: npx expo prebuild --platform android --no-install

      - name: Fix Android build files
        run: |
          # Fix settings.gradle - remove the problematic node command
          cat > android/settings.gradle << 'EOF'
          rootProject.name = 'GeoContacts+'
          include ':app'
          EOF

          # Fix app/build.gradle - use minimal working configuration
          cat > android/app/build.gradle << 'EOF'
          apply plugin: "com.android.application"

          android {
              compileSdkVersion 34
              buildToolsVersion "34.0.0"

              defaultConfig {
                  applicationId "com.geocontacts.plus"
                  minSdkVersion 23
                  targetSdkVersion 34
                  versionCode 1
                  versionName "1.0"
              }

              buildTypes {
                  release {
                      minifyEnabled false
                  }
              }
          }

          dependencies {
              implementation "com.facebook.react:react-native:+"
          }
          EOF

          # Fix build.gradle - minimal configuration
          cat > android/build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath("com.android.tools.build:gradle:8.1.0")
              }
          }

          allprojects {
              repositories {
                  maven { url "$rootDir/../node_modules/react-native/android" }
                  google()
                  mavenCentral()
              }
          }
          EOF

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease -x lint

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
