name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN_YONGXINGNEWS }}

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Prebuild for Android
        run: npx expo prebuild --platform android --no-install

      - name: Fix Android build files for React Native 0.83.2
        run: |
          # Fix settings.gradle for React Native 0.83.2 compatibility
          cat > android/settings.gradle << 'EOF'
          pluginManagement {
            def version = providers.exec {
              commandLine("node", "-e", "console.log(require('react-native/package.json').version);")
            }.standardOutput.asText.get().trim()
            def (_, reactNativeMinor, reactNativePatch) = version.split("-")[0].tokenize('.').collect { it.toInteger() }

            includeBuild(new File(["node", "--print", "require.resolve('@react-native/gradle-plugin/package.json')"].execute(null, rootDir).text.trim()).getParentFile().toString())
            if(reactNativeMinor == 74 && reactNativePatch <= 3){
              includeBuild("react-settings-plugin")
            }
          }

          plugins { id("com.facebook.react.settings") }

          rootProject.name = 'GeoContacts+'

          include ':app'
          def gradlePluginPath = ["node", "--print", "require.resolve('@react-native/gradle-plugin/package.json')"].execute(null, rootDir).text.trim()
          includeBuild(new File(gradlePluginPath).getParentFile())
          EOF

          # Fix build.gradle for React Native 0.83.2 compatibility
          cat > android/build.gradle << 'EOF'
          // Top-level build file where you can add configuration options common to all sub-projects/modules.

          buildscript {
              ext {
                  buildToolsVersion = findProperty('android.buildToolsVersion') ?: '34.0.0'
                  minSdkVersion = Integer.parseInt(findProperty('android.minSdkVersion') ?: '23')
                  compileSdkVersion = Integer.parseInt(findProperty('android.compileSdkVersion') ?: '34')
                  targetSdkVersion = Integer.parseInt(findProperty('android.targetSdkVersion') ?: '34')
                  kotlinVersion = findProperty('android.kotlinVersion') ?: '1.9.23'

                  ndkVersion = "26.1.10909125"
              }
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath('com.android.tools.build:gradle')
                  classpath('com.facebook.react:react-native-gradle-plugin')
                  classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
              }
          }

          apply plugin: "com.facebook.react.rootproject"

          allprojects {
              repositories {
                  maven {
                      // All of React Native (JS, Obj-C sources, Android binaries) is installed from npm
                      url(new File(['node', '--print', "require.resolve('react-native/package.json')"].execute(null, rootDir).text.trim(), '../android'))
                  }
                  google()
                  mavenCentral()
                  maven { url 'https://www.jitpack.io' }
              }
          }
          EOF

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build Android APK
        run: cd android && chmod +x gradlew && ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
