name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN_YONGXINGNEWS }}

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Build with EAS
        run: |
          echo "Starting EAS Build with new account..."
          eas build --platform android --profile preview --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN_YONGXINGNEWS }}

      - name: Download and Upload APK
        run: |
          echo "Build completed!"
          echo "Please visit the EAS Build dashboard to download the APK:"
          echo "https://expo.dev/accounts/moonwishnet/projects/geocontacts-plus/builds"
          echo ""
          echo "Note: If the account name is different, please log in to your Expo account"
          echo "320097502@qq.com to view the builds."
